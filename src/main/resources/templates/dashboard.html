<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout('Dashboard', ~{::main-content}, 'dashboard')}">
<body><th:block th:fragment="main-content">

<div class="stats-grid">
  <div class="stat-card yellow"><span class="stat-icon">👥</span><div class="stat-value" th:text="${totalAlunos}">0</div><div class="stat-label">Total de Alunos</div></div>
  <div class="stat-card green"><span class="stat-icon">✅</span><div class="stat-value" th:text="${alunosAtivos}">0</div><div class="stat-label">Ativos</div></div>
  <div class="stat-card red"><span class="stat-icon">⚠️</span><div class="stat-value" th:text="${inadimplentes}">0</div><div class="stat-label">Inadimplentes</div></div>
  <div class="stat-card blue"><span class="stat-icon">💰</span><div class="stat-value" style="font-size:22px">R$<span th:text="${receita}">0</span></div><div class="stat-label">Receita Total</div></div>
  <div class="stat-card orange"><span class="stat-icon">🔑</span><div class="stat-value" th:text="${checkInsHoje}">0</div><div class="stat-label">Check-ins Hoje</div></div>
  <div class="stat-card blue"><span class="stat-icon">👨‍🏫</span><div class="stat-value" th:text="${totalProfessores}">0</div><div class="stat-label">Professores</div></div>
  <div class="stat-card yellow"><span class="stat-icon">🏋️</span><div class="stat-value" th:text="${totalModalidades}">0</div><div class="stat-label">Modalidades</div></div>
</div>

<div class="grid-2" style="margin-bottom:18px">
  <div class="card">
    <div class="card-title">Planos Contratados</div>
    <div th:if="${planoStats.empty}" class="empty-state" style="padding:30px"><div class="icon">📋</div><p>Sem planos</p></div>
    <div th:each="ps : ${planoStats}" style="margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px">
        <span style="font-weight:600" th:text="${ps.nome}">—</span>
        <span style="color:var(--muted)" th:text="${ps.total} + ' aluno(s)'">0</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" th:style="'width:' + ${ps.total * 15} + '%'"></div></div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">Ocupação Modalidades</div>
    <div th:if="${modStats.empty}" class="empty-state" style="padding:30px"><div class="icon">🏋️</div><p>Sem modalidades</p></div>
    <div th:each="ms : ${modStats}" style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">
      <div style="font-size:13px;font-weight:500;min-width:110px" th:text="${ms.nome}">—</div>
      <div style="flex:1"><div class="progress-bar"><div class="progress-fill" th:classappend="${ms.ocupacao > 80}?' red':''" th:style="'width:' + ${ms.ocupacao} + '%'"></div></div></div>
      <div style="font-size:11px;color:var(--muted)" th:text="${ms.alunos} + '/' + ${ms.capacidade}">0</div>
    </div>
  </div>
</div>

<div class="grid-2">
  <div class="card">
    <div class="card-title">Alunos por Unidade</div>
    <div th:if="${porUnidade.empty}" class="empty-state" style="padding:30px"><div class="icon">🏢</div><p>Sem dados</p></div>
    <div th:each="e : ${porUnidade}" style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)">
      <span style="font-size:14px;font-weight:500" th:text="${e.key}">—</span>
      <span class="badge badge-yellow" th:text="${e.value} + ' aluno(s)'">0</span>
    </div>
  </div>
  <div class="card">
    <div class="card-title" style="display:flex;justify-content:space-between"><span>Check-ins Hoje</span><a th:href="@{/checkin}" class="btn btn-secondary btn-sm">Ver todos</a></div>
    <div th:if="${ultimosCheckIns.empty}" class="empty-state" style="padding:30px"><div class="icon">✅</div><p>Nenhum ainda</p></div>
    <div th:each="c : ${ultimosCheckIns}" class="checkin-item">
      <div class="checkin-avatar" th:text="${#strings.substring(c.nomeAluno,0,1)}">A</div>
      <div style="flex:1"><div style="font-size:14px;font-weight:600" th:text="${c.nomeAluno}">—</div><div style="font-size:12px;color:var(--muted)" th:text="${c.unidade}">—</div></div>
      <div style="font-size:12px;color:var(--muted)" th:text="${c.horarioFormatado}">—</div>
    </div>
  </div>
</div>

</th:block></body></html>
