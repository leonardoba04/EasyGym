<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title th:text="${academia.nome} + ' — Acesso'">EasyGym</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:var(--bg); }
    .login-wrap { width:100%; max-width:420px; padding:20px; }
    .login-card { background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:36px 32px; box-shadow:0 20px 60px rgba(0,0,0,.5); }
    .login-logo { text-align:center; margin-bottom:28px; }
    .login-logo img { width:68px; height:68px; border-radius:14px; object-fit:cover; margin-bottom:10px; }
    .no-logo { width:68px; height:68px; border-radius:14px; background:linear-gradient(135deg,var(--accent),var(--accent2)); display:flex; align-items:center; justify-content:center; font-family:'Barlow Condensed',sans-serif; font-size:26px; font-weight:800; color:#0d0f14; margin:0 auto 10px; }
    .gym-name { font-family:'Barlow Condensed',sans-serif; font-size:26px; font-weight:800; }
    .powered { font-size:11px; color:var(--muted); letter-spacing:1px; margin-top:2px; }
    .powered span { color:var(--accent); font-weight:700; }
    .login-tabs { display:flex; background:var(--surface2); border-radius:10px; padding:4px; margin-bottom:24px; }
    .login-tab { flex:1; padding:9px; border:none; background:transparent; color:var(--muted); border-radius:7px; font-family:'DM Sans',sans-serif; font-size:13px; font-weight:600; cursor:pointer; transition:all .2s; }
    .login-tab.active { background:var(--surface); color:var(--text); box-shadow:0 1px 4px rgba(0,0,0,.3); }
    .tab-pane { display:none; }
    .tab-pane.active { display:block; }
    .hint-box { background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:12px 14px; margin-bottom:16px; font-size:12px; color:var(--muted); line-height:1.6; }
    .hint-box strong { color:var(--text); }
    .btn-login { width:100%; justify-content:center; padding:12px; font-size:15px; margin-top:4px; }
  </style>
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">
      <img th:if="${academia.logoPath != null}" th:src="${academia.logoPath}" alt="Logo"/>
      <div th:unless="${academia.logoPath != null}" class="no-logo" th:text="${#strings.substring(academia.nome,0,1)}">E</div>
      <div class="gym-name" th:text="${academia.nome}">Academia</div>
      <div class="powered">Powered by <span>EasyGym</span></div>
    </div>

    <div th:if="${erro}" class="alert alert-error" style="margin-bottom:16px">
      Matrícula/email ou senha incorretos.
    </div>
    <div th:if="${saiu}" class="alert alert-success" style="margin-bottom:16px">
      Voce saiu do sistema.
    </div>

    <div class="login-tabs">
      <button class="login-tab active" onclick="showTab('func',this)">Equipe</button>
      <button class="login-tab" onclick="showTab('aluno',this)">Sou Aluno</button>
    </div>

    <div class="tab-pane active" id="tab-func">
      <div class="hint-box">Acesso para <strong>administradores</strong> e <strong>funcionários</strong>.</div>
      <form method="post" th:action="@{/login}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <div class="form-group"><label>Email</label><input type="email" name="username" required placeholder="seu@email.com" id="func-inp"/></div>
        <div class="form-group"><label>Senha</label><input type="password" name="password" required placeholder="••••••••"/></div>
        <button type="submit" class="btn btn-primary btn-login">Entrar</button>
      </form>
    </div>

    <div class="tab-pane" id="tab-aluno">
      <div class="hint-box">Use sua <strong>matricula</strong> (ex: MAT00001) e senha.<br/>Senha inicial padrao: <strong>123456</strong></div>
      <form method="post" th:action="@{/login}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <div class="form-group"><label>Matricula</label><input type="text" name="username" required placeholder="MAT00001" id="aluno-inp"/></div>
        <div class="form-group"><label>Senha</label><input type="password" name="password" required placeholder="••••••••"/></div>
        <button type="submit" class="btn btn-primary btn-login">Entrar como Aluno</button>
      </form>
    </div>

    <div style="text-align:center;margin-top:16px;font-size:12px;color:var(--muted)">Problemas? Contate a recepcao.</div>
  </div>
</div>
<script>
function showTab(n,b){
  document.querySelectorAll('.tab-pane').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.login-tab').forEach(x=>x.classList.remove('active'));
  document.getElementById('tab-'+n).classList.add('active');
  b.classList.add('active');
  const i=document.querySelector('#tab-'+n+' input');if(i)i.focus();
}
document.addEventListener('DOMContentLoaded',()=>{const i=document.getElementById('func-inp');if(i)i.focus();});
</script>
</body>
</html>
