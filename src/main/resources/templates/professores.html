<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout('Professores', ~{::main-content}, 'professores')}">
<body><th:block th:fragment="main-content">

<div th:if="${sucesso}" class="alert alert-success">✅ <span th:text="${sucesso}"></span></div>

<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:22px">
  <div>
    <h2 style="font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:800">Professores</h2>
    <p style="color:var(--muted);font-size:13px;margin-top:2px" th:text="${professores.size()} + ' professor(es) cadastrado(s)'"></p>
  </div>
  <button th:if="${isAdmin}" class="btn btn-primary" onclick="openModal('modal-prof')">+ Novo Professor</button>
</div>

<div class="card">
  <div class="table-wrapper">
    <table>
      <thead><tr><th>ID</th><th>Nome</th><th>Modalidade</th><th>Unidade</th><th>Contato</th><th th:if="${isAdmin}">Ações</th></tr></thead>
      <tbody>
        <tr th:if="${professores.empty}">
          <td colspan="6" style="text-align:center;padding:40px;color:var(--muted)">Nenhum professor cadastrado</td>
        </tr>
        <tr th:each="p : ${professores}">
          <td style="color:var(--muted);font-size:12px" th:text="'#' + ${p.id}">—</td>
          <td>
            <div style="display:flex;align-items:center;gap:9px">
              <div class="checkin-avatar" style="width:30px;height:30px;font-size:11px;background:linear-gradient(135deg,var(--blue),var(--accent))"
                   th:text="${#strings.substring(p.nome,0,1)}">P</div>
              <div>
                <div style="font-weight:600;font-size:14px" th:text="${p.nome}">—</div>
                <div style="font-size:11px;color:var(--muted)" th:text="${p.email}">—</div>
              </div>
            </div>
          </td>
          <td><span class="badge badge-orange" th:text="${p.modalidade}">—</span></td>
          <td><span class="badge badge-blue" th:text="${p.unidade}">—</span></td>
          <td style="font-size:13px;color:var(--muted)" th:text="${p.telefone}">—</td>
          <td th:if="${isAdmin}">
            <form th:action="@{/professores/remover/{id}(id=${p.id})}" method="post"
                  onsubmit="return confirm('Remover professor?')">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
              <button type="submit" class="btn btn-danger btn-sm">✕</button>
            </form>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<!-- Modal -->
<div class="modal-backdrop" id="modal-prof">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Novo Professor</span>
      <button class="modal-close" onclick="closeModal('modal-prof')">✕</button>
    </div>
    <form th:action="@{/professores/cadastrar}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <div class="form-row">
        <div class="form-group"><label>Nome *</label><input type="text" name="nome" required placeholder="Carlos Silva"/></div>
        <div class="form-group"><label>Email</label><input type="email" name="email" placeholder="carlos@academia.com"/></div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Modalidade *</label>
          <select name="modalidade" required>
            <option value="">Selecione...</option>
            <option th:each="m : ${modalidades}" th:value="${m.nome}" th:text="${m.nome}">—</option>
          </select>
        </div>
        <div class="form-group"><label>Unidade *</label><input type="text" name="unidade" required placeholder="Centro"/></div>
      </div>
      <div class="form-group"><label>Telefone</label><input type="text" name="telefone" placeholder="(11) 99999-0000"/></div>
      <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:8px">
        <button type="button" class="btn btn-secondary" onclick="closeModal('modal-prof')">Cancelar</button>
        <button type="submit" class="btn btn-primary">Cadastrar</button>
      </div>
    </form>
  </div>
</div>

</th:block></body></html>
