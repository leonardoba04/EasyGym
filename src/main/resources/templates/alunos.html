<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout('Alunos', ~{::main-content}, 'alunos')}">
<body><th:block th:fragment="main-content">

<div th:if="${sucesso}" class="alert alert-success">✅ <span th:text="${sucesso}"></span></div>
<div th:if="${erro}" class="alert alert-error">❌ <span th:text="${erro}"></span></div>

<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:22px">
  <div>
    <h2 style="font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:800">Alunos</h2>
    <p style="color:var(--muted);font-size:13px;margin-top:2px" th:text="${alunosComStatus.size()} + ' aluno(s) cadastrado(s)'"></p>
  </div>
  <button class="btn btn-primary" onclick="openModal('modal-aluno')">+ Novo Aluno</button>
</div>

<div class="card">
  <div class="table-wrapper">
    <table>
      <thead><tr><th>ID</th><th>Nome</th><th>Idade</th><th>Unidade</th><th>Plano</th><th>Nível</th><th>Pagamento</th><th>Ações</th></tr></thead>
      <tbody>
        <tr th:if="${alunosComStatus.empty}"><td colspan="8" style="text-align:center;padding:40px;color:var(--muted)">Nenhum aluno cadastrado</td></tr>
        <tr th:each="item : ${alunosComStatus}">
          <td style="color:var(--muted);font-size:12px" th:text="'#' + ${item.aluno.id}"></td>
          <td>
            <div style="display:flex;align-items:center;gap:9px">
              <div class="checkin-avatar" style="width:30px;height:30px;font-size:11px" th:text="${#strings.substring(item.aluno.nome,0,1)}">A</div>
              <div>
                <div style="font-weight:600;font-size:14px" th:text="${item.aluno.nome}">—</div>
                <div style="font-size:11px;color:var(--muted)" th:text="${item.aluno.email}">—</div>
              </div>
            </div>
          </td>
          <td th:text="${item.aluno.idade} + ' anos'">—</td>
          <td><span class="badge badge-blue" th:text="${item.aluno.unidade}">—</span></td>
          <td style="font-size:13px" th:text="${item.nomePlano}">—</td>
          <td><span class="badge badge-gray" th:text="${item.aluno.nivelAtividade}">—</span></td>
          <td>
            <span th:if="${item.ativo}" class="badge badge-green">● Ativo</span>
            <span th:unless="${item.ativo}" class="badge badge-red">● Vencido</span>
          </td>
          <td>
            <div style="display:flex;gap:5px">
              <a th:href="@{/alunos/{id}(id=${item.aluno.id})}" class="btn btn-secondary btn-sm">Ver</a>
              <form th:action="@{/alunos/remover/{id}(id=${item.aluno.id})}" method="post" onsubmit="return confirm('Remover aluno?')">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-danger btn-sm">✕</button>
              </form>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<!-- Modal Cadastrar Aluno -->
<div class="modal-backdrop" id="modal-aluno">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Novo Aluno</span>
      <button class="modal-close" onclick="closeModal('modal-aluno')">✕</button>
    </div>
    <form th:action="@{/alunos/cadastrar}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <div class="form-row">
        <div class="form-group"><label>Nome Completo *</label><input type="text" name="nome" required placeholder="João Silva"/></div>
        <div class="form-group"><label>Email</label><input type="email" name="email" placeholder="joao@email.com"/></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Idade *</label><input type="number" name="idade" required min="10" max="100" placeholder="25"/></div>
        <div class="form-group"><label>Telefone</label><input type="text" name="telefone" placeholder="(11) 99999-0000"/></div>
      </div>
      <div class="form-group"><label>Endereço *</label><input type="text" name="endereco" required placeholder="Rua das Flores, 100"/></div>
      <div class="form-row">
        <div class="form-group"><label>Peso (kg) *</label><input type="number" name="peso" step="0.1" required placeholder="75.0"/></div>
        <div class="form-group"><label>Altura (m) *</label><input type="number" name="altura" step="0.01" required placeholder="1.75"/></div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Nível de Atividade *</label>
          <select name="nivelAtividade" required>
            <option th:each="n : ${niveis}" th:value="${n.name()}" th:text="${n.descricao}">—</option>
          </select>
        </div>
        <div class="form-group">
          <label>Unidade *</label>
          <select name="unidade" required>
            <option th:if="${filiais.empty}" value="Principal">Principal</option>
            <option th:each="f : ${filiais}" th:value="${f.nome}" th:text="${f.nome}">—</option>
          </select>
        </div>
      </div>
      <div class="form-group"><label>Problemas de Saúde</label><input type="text" name="problemasDeSaude" placeholder="Nenhum"/></div>
      <div class="form-group">
        <label>Plano *</label>
        <select name="idPlano" required>
          <option th:if="${planos.empty}" value="">Nenhum plano disponível</option>
          <option th:each="p : ${planos}" th:value="${p.id}"
                  th:text="${p.nome} + ' — R$ ' + ${#numbers.formatDecimal(p.valor,1,'POINT',2,'COMMA')}">—</option>
        </select>
      </div>
      <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:8px">
        <button type="button" class="btn btn-secondary" onclick="closeModal('modal-aluno')">Cancelar</button>
        <button type="submit" class="btn btn-primary">Cadastrar</button>
      </div>
    </form>
  </div>
</div>

</th:block></body></html>
