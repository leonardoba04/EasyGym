<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:fragment="layout(title, content, active)">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title th:text="${title} + ' — ' + ${academia.nome}">Portal</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
  <link rel="stylesheet" th:href="@{/css/portal.css}"/>
  <style th:if="${academia != null and academia.corPrimaria != null}"
         th:text="':root{--academia-cor1:' + ${academia.corPrimaria} + ';--academia-cor2:' + ${academia.corSecundaria} + '}'"></style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-logo">
    <img th:if="${academia != null and academia.logoPath != null}" th:src="${academia.logoPath}" alt="Logo"
         style="width:40px;height:40px;border-radius:8px;object-fit:cover;flex-shrink:0"/>
    <div th:unless="${academia != null and academia.logoPath != null}"
         style="width:40px;height:40px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:800;color:#0d0f14;flex-shrink:0"
         th:text="${academia != null ? #strings.substring(academia.nome,0,1) : 'E'}">E</div>
    <div class="brand-text">
      <div class="name" th:text="${academia != null ? academia.nome : 'Academia'}">Academia</div>
      <div style="font-size:10px;color:var(--accent);font-weight:700;letter-spacing:1px">Portal do Aluno</div>
    </div>
  </div>

  <!-- Avatar do aluno -->
  <div style="padding:16px 20px;border-bottom:1px solid var(--border)">
    <div style="display:flex;align-items:center;gap:10px">
      <div style="width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;color:#0d0f14;flex-shrink:0"
           th:text="${aluno != null ? #strings.substring(aluno.nome,0,1) : 'A'}">A</div>
      <div>
        <div style="font-size:14px;font-weight:700" th:text="${aluno != null ? aluno.nome : ''}">—</div>
        <div style="font-size:11px;color:var(--muted)" th:text="${aluno != null ? aluno.matricula : ''}">—</div>
      </div>
    </div>
  </div>

  <nav class="sidebar-nav">
    <a th:href="@{/aluno/home}" class="nav-link" th:classappend="${active == 'home'} ? ' active' : ''">
      <span class="icon">🏠</span> Início
    </a>
    <a th:href="@{/aluno/perfil}" class="nav-link" th:classappend="${active == 'perfil'} ? ' active' : ''">
      <span class="icon">👤</span> Meu Perfil
    </a>
    <a th:href="@{/aluno/horarios}" class="nav-link" th:classappend="${active == 'horarios'} ? ' active' : ''">
      <span class="icon">📅</span> Horários
    </a>
    <a th:href="@{/aluno/frequencia}" class="nav-link" th:classappend="${active == 'frequencia'} ? ' active' : ''">
      <span class="icon">📊</span> Minha Frequência
    </a>
    <a th:href="@{/aluno/mensagens}" class="nav-link" th:classappend="${active == 'mensagens'} ? ' active' : ''">
      <span class="icon">💬</span> Mensagens
      <span th:if="${naoLidasMensagens != null and naoLidasMensagens > 0}"
            class="badge badge-red"
            style="margin-left:auto;font-size:10px;padding:2px 7px"
            th:text="${naoLidasMensagens}">0</span>
    </a>
  </nav>

  <div class="sidebar-user">
    <div style="flex:1">
      <div style="font-size:11px;color:var(--muted)" th:text="${aluno != null ? aluno.unidade : ''}">—</div>
    </div>
    <form th:action="@{/logout}" method="post" style="margin:0">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <button type="submit" class="logout-btn" title="Sair">⏻</button>
    </form>
  </div>
</aside>

<div class="main">
  <div class="topbar">
    <h1 th:text="${title}">—</h1>
    <div style="display:flex;align-items:center;gap:10px">
      <span style="font-size:12px;color:var(--green)">● Online</span>
    </div>
  </div>
  <div class="content">
    <div th:replace="${content}"></div>
  </div>
</div>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
