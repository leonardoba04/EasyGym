<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{portal/layout :: layout('Chat', ~{::main-content}, 'mensagens')}">
<body><th:block th:fragment="main-content">

<!-- Header do chat -->
<div style="display:flex;align-items:center;gap:14px;margin-bottom:20px">
  <a th:href="@{/aluno/mensagens}" class="btn btn-secondary btn-sm">← Voltar</a>
  <div class="checkin-avatar"
       style="width:42px;height:42px;font-size:18px;background:linear-gradient(135deg,var(--blue),var(--accent))"
       th:text="${#strings.substring(professor.nome,0,1)}">P</div>
  <div>
    <div style="font-size:16px;font-weight:700" th:text="${professor.nome}">—</div>
    <div style="font-size:12px;color:var(--muted)" th:text="${professor.modalidade}">—</div>
  </div>
</div>

<!-- Chat box -->
<div class="card" style="padding:0;overflow:hidden">
  <div class="chat-container">

    <!-- Mensagens -->
    <div class="chat-messages" id="chat-scroll">
      <div th:if="${mensagens.empty}" style="text-align:center;color:var(--muted);padding:40px;font-size:14px">
        💬 Nenhuma mensagem ainda. Diga olá!
      </div>

      <div th:each="msg : ${mensagens}">
        <!-- Mensagem do aluno (enviado) -->
        <div th:if="${msg.doAluno}" style="display:flex;justify-content:flex-end">
          <div>
            <div class="chat-bubble enviado" th:text="${msg.texto}">—</div>
            <div class="chat-meta" style="text-align:right;color:var(--muted)" th:text="${msg.dataHoraFormatada}">—</div>
          </div>
        </div>

        <!-- Mensagem do professor (recebido) -->
        <div th:unless="${msg.doAluno}" style="display:flex;justify-content:flex-start">
          <div>
            <div style="font-size:11px;color:var(--muted);margin-bottom:3px;margin-left:4px"
                 th:text="${msg.nomeRemetente}">—</div>
            <div class="chat-bubble recebido" th:text="${msg.texto}">—</div>
            <div class="chat-meta" style="color:var(--muted);margin-left:4px" th:text="${msg.dataHoraFormatada}">—</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Input -->
    <form th:action="@{/aluno/mensagens/{id}/enviar(id=${professor.id})}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <div class="chat-input-bar">
        <input type="text" name="texto" id="msg-input"
               placeholder="Digite sua mensagem..." required
               autocomplete="off"
               style="flex:1"/>
        <button type="submit" class="btn btn-primary">Enviar ➤</button>
      </div>
    </form>
  </div>
</div>

<script>
  // Scroll para o final do chat
  const chatScroll = document.getElementById('chat-scroll');
  if (chatScroll) chatScroll.scrollTop = chatScroll.scrollHeight;

  // Foco automático no input
  const input = document.getElementById('msg-input');
  if (input) input.focus();

  // Enviar com Enter
  if (input) {
    input.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        this.closest('form').submit();
      }
    });
  }
</script>

</th:block></body></html>
