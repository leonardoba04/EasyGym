<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{portal/layout :: layout('Horários', ~{::main-content}, 'horarios')}">
<body><th:block th:fragment="main-content">

<div style="margin-bottom:22px">
  <h2 style="font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:800">Horários e Modalidades</h2>
  <p style="color:var(--muted);font-size:13px;margin-top:2px"
     th:text="'Atividades disponíveis na unidade ' + ${aluno.unidade}">—</p>
</div>

<div th:if="${modComProfs.empty}" class="empty-state">
  <div class="icon">📅</div>
  <p>Nenhuma modalidade cadastrada para sua unidade.</p>
</div>

<div class="grid-2">
  <div th:each="item : ${modComProfs}" class="card">

    <!-- Cabeçalho da modalidade -->
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px">
      <div>
        <div style="font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:800"
             th:text="${item.modalidade.nome}">—</div>
        <div style="display:flex;align-items:center;gap:8px;margin-top:4px">
          <span class="badge badge-blue" th:text="${item.modalidade.unidade}">—</span>
          <span style="font-size:12px;color:var(--muted)"
                th:text="${item.modalidade.capacidade} + ' vagas totais'">—</span>
        </div>
      </div>
      <!-- Indicador de ocupação -->
      <div style="text-align:center">
        <div style="font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800"
             th:classappend="${item.modalidade.ocupacaoPercent > 80} ? 'style=color:var(--red)' : ''"
             th:text="${#numbers.formatDecimal(item.modalidade.ocupacaoPercent,1,'POINT',0,'COMMA')} + '%'">0%</div>
        <div style="font-size:10px;color:var(--muted)">ocupado</div>
      </div>
    </div>

    <!-- Barra de ocupação -->
    <div class="progress-bar" style="margin-bottom:16px">
      <div class="progress-fill"
           th:classappend="${item.modalidade.ocupacaoPercent > 80} ? ' red' : ''"
           th:style="'width:' + ${item.modalidade.ocupacaoPercent} + '%'"></div>
    </div>

    <!-- Horários -->
    <div style="margin-bottom:16px">
      <div style="font-size:11px;color:var(--muted);font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:9px">
        Horários Disponíveis
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:8px">
        <span th:each="h : ${item.modalidade.horarios}" class="horario-pill">
          ⏰ <span th:text="${h}">—</span>
        </span>
        <span th:if="${item.modalidade.horarios.empty}" style="font-size:13px;color:var(--muted)">
          Sem horários cadastrados
        </span>
      </div>
    </div>

    <!-- Professores -->
    <div th:unless="${item.professores.empty}">
      <div style="font-size:11px;color:var(--muted);font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:9px">
        Professores
      </div>
      <div th:each="prof : ${item.professores}"
           th:if="${prof != null}"
           style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
        <div style="display:flex;align-items:center;gap:9px">
          <div class="checkin-avatar" style="width:30px;height:30px;font-size:11px;background:linear-gradient(135deg,var(--blue),var(--accent))"
               th:text="${#strings.substring(prof.nome,0,1)}">P</div>
          <div>
            <div style="font-size:13px;font-weight:600" th:text="${prof.nome}">—</div>
            <div style="font-size:11px;color:var(--muted)" th:text="${prof.email}">—</div>
          </div>
        </div>
        <a th:href="@{/aluno/mensagens/{id}(id=${prof.id})}"
           class="btn btn-secondary btn-sm">💬 Contato</a>
      </div>
    </div>
  </div>
</div>

</th:block></body></html>
