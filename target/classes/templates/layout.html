<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:fragment="layout(title, content, active)">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title th:text="${title} + ' — ' + ${academia.nome}">EasyGym</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
  <style th:if="${academia.corPrimaria != null}"
         th:text="':root { --academia-cor1: ' + ${academia.corPrimaria} + '; --academia-cor2: ' + ${academia.corSecundaria} + '; }'">
  </style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-logo">
    <img th:if="${academia.logoPath != null}" th:src="${academia.logoPath}" alt="Logo"/>
    <div th:unless="${academia.logoPath != null}"
         style="width:40px;height:40px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:800;color:#0d0f14;flex-shrink:0"
         th:text="${#strings.substring(academia.nome,0,1)}">E</div>
    <div class="brand-text">
      <div class="name" th:text="${academia.nome}">Academia</div>
      <div class="easygym-badge">EasyGym</div>
    </div>
  </div>

  <nav class="sidebar-nav">
    <div class="nav-section">Visão Geral</div>
    <a th:href="@{/}" class="nav-link" th:classappend="${active=='dashboard'}?' active':''">
      <span class="icon">📊</span> Dashboard
    </a>

    <div class="nav-section">Gestão</div>
    <a th:href="@{/alunos}" class="nav-link" th:classappend="${active=='alunos'}?' active':''">
      <span class="icon">👤</span> Alunos
    </a>
    <a th:href="@{/professores}" class="nav-link" th:classappend="${active=='professores'}?' active':''">
      <span class="icon">👨‍🏫</span> Professores
    </a>
    <a th:href="@{/modalidades}" class="nav-link" th:classappend="${active=='modalidades'}?' active':''">
      <span class="icon">🏋️</span> Modalidades
    </a>
    <a th:href="@{/planos}" class="nav-link" th:classappend="${active=='planos'}?' active':''">
      <span class="icon">📋</span> Planos
    </a>

    <div class="nav-section">Operações</div>
    <a th:href="@{/checkin}" class="nav-link" th:classappend="${active=='checkin'}?' active':''">
      <span class="icon">✅</span> Check-in
    </a>

    <div class="nav-section" sec:authorize="hasRole('ADMIN')">Admin</div>
    <a th:href="@{/academia}" class="nav-link" sec:authorize="hasRole('ADMIN')"
       th:classappend="${active=='academia'}?' active':''">
      <span class="icon">🏢</span> Minha Academia
    </a>
  </nav>

  <div class="sidebar-user">
    <div class="user-avatar" th:text="${#strings.substring(nomeUsuario,0,1)}">U</div>
    <div class="user-info">
      <div class="name" th:text="${nomeUsuario}">Usuário</div>
      <div class="role" sec:authorize="hasRole('ADMIN')">Administrador</div>
      <div class="role" sec:authorize="hasRole('FUNCIONARIO')">Funcionário</div>
    </div>
    <form th:action="@{/logout}" method="post" style="margin:0">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <button type="submit" class="logout-btn" title="Sair">⏻</button>
    </form>
  </div>
</aside>

<div class="main">
  <div class="topbar">
    <h1 th:text="${title}">Página</h1>
    <div style="display:flex;align-items:center;gap:12px">
      <span style="font-size:12px;color:var(--muted)" th:text="${academia.filiais.size()} + ' filial(is)'">0 filiais</span>
      <span style="font-size:12px;color:var(--green)">● Online</span>
    </div>
  </div>

  <div class="content">
    <div th:replace="${content}"></div>
  </div>
</div>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
