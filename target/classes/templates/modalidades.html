<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout('Modalidades', ~{::main-content}, 'modalidades')}">
<body><th:block th:fragment="main-content">

<div th:if="${sucesso}" class="alert alert-success">✅ <span th:text="${sucesso}"></span></div>

<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:22px">
  <div>
    <h2 style="font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:800">Modalidades</h2>
    <p style="color:var(--muted);font-size:13px;margin-top:2px">Atividades e horários disponíveis na academia</p>
  </div>
  <button th:if="${isAdmin}" class="btn btn-primary" onclick="openModal('modal-mod')">+ Nova Modalidade</button>
</div>

<div class="grid-2">
  <div th:each="item : ${modalidadesComProfs}" class="card">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px">
      <div>
        <div style="font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800" th:text="${item.modalidade.nome}">—</div>
        <span class="badge badge-blue" th:text="${item.modalidade.unidade}">—</span>
      </div>
      <form th:if="${isAdmin}" th:action="@{/modalidades/remover/{id}(id=${item.modalidade.id})}" method="post"
            onsubmit="return confirm('Remover modalidade?')">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit" class="btn btn-danger btn-sm">✕</button>
      </form>
    </div>

    <!-- Ocupação -->
    <div style="margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:5px">
        <span>Ocupação</span>
        <span th:text="${#lists.size(item.modalidade.idAlunos)} + '/' + ${item.modalidade.capacidade} + ' vagas'">0</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill"
             th:classappend="${item.modalidade.ocupacaoPercent > 80} ? ' red' : ''"
             th:style="'width:' + ${item.modalidade.ocupacaoPercent} + '%'"></div>
      </div>
    </div>

    <!-- Horários -->
    <div style="margin-bottom:12px">
      <div style="font-size:11px;color:var(--muted);font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:7px">Horários</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px">
        <span th:each="h : ${item.modalidade.horarios}" class="badge badge-yellow" th:text="${h}">—</span>
        <span th:if="${item.modalidade.horarios.empty}" style="font-size:13px;color:var(--muted)">Nenhum horário</span>
      </div>
    </div>

    <!-- Professores -->
    <div>
      <div style="font-size:11px;color:var(--muted);font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:7px">Professores</div>
      <div th:if="${item.professores.empty}" style="font-size:13px;color:var(--muted)">Nenhum vinculado</div>
      <div th:each="np : ${item.professores}" style="display:flex;align-items:center;gap:8px;margin-bottom:5px">
        <div class="checkin-avatar" style="width:26px;height:26px;font-size:10px;background:linear-gradient(135deg,var(--blue),var(--accent))"
             th:text="${#strings.substring(np,0,1)}">P</div>
        <span style="font-size:13px;font-weight:500" th:text="${np}">—</span>
      </div>
    </div>
  </div>

  <div th:if="${modalidadesComProfs.empty}" style="grid-column:1/-1" class="empty-state">
    <div class="icon">🏋️</div><p>Nenhuma modalidade cadastrada</p>
    <button th:if="${isAdmin}" class="btn btn-primary" style="margin-top:16px" onclick="openModal('modal-mod')">Criar primeira modalidade</button>
  </div>
</div>

<!-- Modal -->
<div class="modal-backdrop" id="modal-mod">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Nova Modalidade</span>
      <button class="modal-close" onclick="closeModal('modal-mod')">✕</button>
    </div>
    <form th:action="@{/modalidades/cadastrar}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <div class="form-row">
        <div class="form-group"><label>Nome *</label><input type="text" name="nome" required placeholder="Musculação"/></div>
        <div class="form-group"><label>Unidade *</label><input type="text" name="unidade" required placeholder="Centro"/></div>
      </div>
      <div class="form-group"><label>Capacidade (pessoas) *</label><input type="number" name="capacidade" required placeholder="30" min="1"/></div>
      <div class="form-group">
        <label>Horários (separados por vírgula)</label>
        <input type="text" name="horarios" placeholder="06:00, 12:00, 18:00"/>
      </div>
      <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:8px">
        <button type="button" class="btn btn-secondary" onclick="closeModal('modal-mod')">Cancelar</button>
        <button type="submit" class="btn btn-primary">Cadastrar</button>
      </div>
    </form>
  </div>
</div>

</th:block></body></html>
